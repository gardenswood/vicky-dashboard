steps:
  # Build the container image with Next.js public env vars as Docker build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=gcr.io/$PROJECT_ID/vicky-dashboard:latest'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '.'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vicky-dashboard:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vicky-dashboard'
      - '--image=gcr.io/$PROJECT_ID/vicky-dashboard:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-env-vars=FIREBASE_ADMIN_PROJECT_ID=webgardens-8655d,FIREBASE_ADMIN_CLIENT_EMAIL=firebase-adminsdk-fbsvc@webgardens-8655d.iam.gserviceaccount.com,SESSION_SECRET=vicky-dashboard-secret-gardens-wood-2026'
      - '--set-secrets=FIREBASE_ADMIN_PRIVATE_KEY=firebase-admin-private-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/vicky-dashboard:latest'

substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'AIzaSyANnFX3Zz3DjvwscqOACOItRFfVAZUrxKY'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'webgardens-8655d.firebaseapp.com'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'webgardens-8655d'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'webgardens-8655d.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '873395475837'
  _NEXT_PUBLIC_FIREBASE_APP_ID: '1:873395475837:web:7daf13f132687451dbe814'

options:
  logging: CLOUD_LOGGING_ONLY
